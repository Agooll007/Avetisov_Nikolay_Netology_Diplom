- name: Install Filebeat on web servers
  hosts: webservers
  become: true

  tasks:
    - name: Install Filebeat from local deb
      ansible.builtin.apt:
        deb: /home/ubuntu/filebeat-8.12.2-amd64.deb

    - name: Configure Filebeat
      ansible.builtin.copy:
        dest: /etc/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
            - type: filestream
              id: nginx-access
              enabled: true
              paths:
                - /var/log/nginx/access.log

            - type: filestream
              id: nginx-error
              enabled: true
              paths:
                - /var/log/nginx/error.log

          output.elasticsearch:
            hosts: ["http://elasticsearch.ru-central1.internal:9200"]

        owner: root
        group: root
        mode: '0644'

    - name: Restart and enable Filebeat
      ansible.builtin.systemd:
        name: filebeat
        enabled: true
        state: restarted
